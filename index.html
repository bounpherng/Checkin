<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ລະບົບຕິດຕາມການເຊັກອິນ</title>
  <meta name="description" content="ຕິດຕາມການເຊັກອິນເຂົ້າອອກຫ້ອງການ">
  
  <link rel="manifest" href="/Checkin/manifest.json" />
  <link rel="icon" href="/Checkin/icon-512.png" />
  <link rel="apple-touch-icon" href="/Checkin/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a5c35">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --green:       #1e7d40;
      --green-mid:   #2e9a57;
      --green-dark:  #0f4422;
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dark:   #8a6820;
      --cream:       #fdf9f0;
      --white:       #ffffff;
      --text-dark:   #0c2e18;
      --text-mid:    #2a5a38;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans Lao', sans-serif;
      background: var(--green-dark);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ===== HERO BACKGROUND ===== */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(46,154,87,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(201,168,76,0.15) 0%, transparent 55%),
        linear-gradient(160deg, #0a2f16 0%, #143d22 40%, #0f2b18 100%);
    }

    /* Gold light beams */
    .beam {
      position: absolute;
      bottom: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 200%;
      height: 70%;
      background: conic-gradient(
        from 260deg at 50% 100%,
        transparent 0deg,
        rgba(201,168,76,0.06) 5deg,
        transparent 10deg,
        transparent 15deg,
        rgba(201,168,76,0.04) 20deg,
        transparent 25deg,
        transparent 35deg,
        rgba(201,168,76,0.07) 40deg,
        transparent 45deg,
        transparent 60deg,
        rgba(201,168,76,0.05) 65deg,
        transparent 70deg
      );
      animation: beamRotate 20s linear infinite;
      pointer-events: none;
    }

    @keyframes beamRotate {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-light);
      opacity: 0;
      animation: floatUp var(--dur, 8s) var(--delay, 0s) ease-in infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    /* ===== MAIN LAYOUT ===== */
    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px 50px;
    }

    /* ===== TOP BADGE ===== */
    .org-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50px;
      padding: 8px 18px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
      animation: slideDown 0.8s ease both;
    }

    .org-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px var(--gold); }
      50% { box-shadow: 0 0 14px var(--gold-light); }
    }

    .org-badge span {
      font-size: 12px;
      color: var(--gold-light);
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* ===== HERO IMAGE CARD ===== */
    .hero-card {
      width: 100%;
      max-width: 440px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 
        0 0 0 1px rgba(201,168,76,0.25),
        0 30px 80px rgba(0,0,0,0.5),
        0 0 60px rgba(201,168,76,0.08);
      animation: fadeUp 1s ease 0.2s both;
      position: relative;
    }

    .hero-img-wrapper {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
    }

    .hero-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      transition: transform 8s ease;
    }

    .hero-card:hover .hero-img-wrapper img {
      transform: scale(1.05);
    }

    .hero-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        rgba(10,30,18,0.4) 60%,
        rgba(10,30,18,0.85) 100%
      );
    }

    .hero-img-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(201,168,76,0.4);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--gold-light);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    /* Logo overlay on image */
    .logo-on-image {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.6);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .logo-on-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== CARD BODY ===== */
    .card-body {
      background: linear-gradient(170deg, #0e3a20 0%, #0a2918 100%);
      padding: 26px 28px 30px;
      border-top: 1px solid rgba(201,168,76,0.2);
    }

    .gold-line {
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      margin: 0 auto 18px;
      box-shadow: 0 0 10px rgba(201,168,76,0.5);
    }

    .card-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    .card-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-bottom: 28px;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* ===== BUTTONS ===== */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--green-dark);
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #b8922e 100%);
      box-shadow: 0 6px 24px rgba(201,168,76,0.35), 0 2px 8px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover::after { left: 150%; }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201,168,76,0.45), 0 4px 12px rgba(0,0,0,0.3);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary svg {
      flex-shrink: 0;
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(201,168,76,0.4);
      color: var(--gold-light);
    }

    /* ===== QR SECTION ===== */
    .qr-section {
      width: 100%;
      max-width: 440px;
      margin-top: 20px;
      animation: fadeUp 1s ease 0.5s both;
    }

    .qr-details {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .qr-summary {
      cursor: pointer;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      transition: background 0.2s;
    }

    .qr-summary::-webkit-details-marker { display: none; }
    .qr-summary:hover { background: rgba(255,255,255,0.04); }

    .qr-summary-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qr-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .qr-summary h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }

    .qr-chevron {
      color: rgba(255,255,255,0.4);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    details[open] .qr-chevron {
      transform: rotate(180deg);
    }

    details[open] .qr-summary {
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }

    .qr-content {
      padding: 24px;
      text-align: center;
    }

    .qr-content p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 18px;
      font-weight: 300;
    }

    .qr-img-wrapper {
      display: inline-block;
      padding: 14px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.3);
    }

    .qr-img-wrapper img {
      width: 160px;
      height: 160px;
      display: block;
      border-radius: 8px;
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      line-height: 1.8;
      animation: fadeUp 1s ease 0.7s both;
    }

    footer strong { color: rgba(255,255,255,0.5); }
    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { color: var(--gold-light); }

    /* ===== ANIMATIONS ===== */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="hero-bg">
    <div class="beam"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div class="page-wrapper">

    <!-- Top Badge -->
    <div class="org-badge">
      <div class="org-badge-dot"></div>
      <span>ຫ້ອງການປະກັນສັງຄົມແຂວງ</span>
    </div>

    <!-- Hero Card -->
    <div class="hero-card">

      <!-- Image -->
      <div class="hero-img-wrapper">
        <img 
          src="https://raw.githubusercontent.com/bounpherng/Checkin/main/logo.jpg"
          alt="ກອງປະກັນສັງຄົມ"
          onerror="this.onerror=null; this.src='https://i.ibb.co/8gPz5vZP/qr-code.png';"
        >
        <div class="hero-img-overlay"></div>
        <div class="hero-img-badge">SSO</div>
        <div class="logo-on-image">
          <img 
            src="https://raw.githubusercontent.com/bounpherng/Checkin/main/logo.jpg"
            alt="logo"
            onerror="this.style.display='none'"
          >
        </div>
      </div>

      <!-- Body -->
      <div class="card-body">
        <div class="gold-line"></div>

        <h1 class="card-title">ເຂົ້າສູ່ລະບົບເຊັກອິນ</h1>
        <p class="card-subtitle">ຫ້ອງປະກັນສັງຄົມແຂວງ</p>

        <button class="btn-primary" id="openApp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6M10 14L21 3M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          </svg>
          ໄປທີ່ຫນ້າເຊັກອິນ
        </button>

        <button class="btn-secondary" id="installApp" style="display:none">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
            <line x1="12" y1="18" x2="12" y2="18"/>
          </svg>
          ຕິດຕັ້ງແອັບໃສ່ໂທລະສັບ
        </button>
      </div>
    </div>

    <!-- QR Section -->
    <div class="qr-section">
      <div class="qr-details">
        <details>
          <summary class="qr-summary">
            <div class="qr-summary-left">
              <div class="qr-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f4422" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                  <line x1="14" y1="14" x2="14" y2="14"/><line x1="17" y1="14" x2="17" y2="14"/><line x1="20" y1="14" x2="20" y2="14"/>
                  <line x1="14" y1="17" x2="14" y2="17"/><line x1="17" y1="17" x2="17" y2="17"/><line x1="20" y1="17" x2="20" y2="17"/>
                  <line x1="14" y1="20" x2="14" y2="20"/><line x1="17" y1="20" x2="17" y2="20"/><line x1="20" y1="20" x2="20" y2="20"/>
                </svg>
              </div>
              <h2>ສະແກນ QR CODE</h2>
            </div>
            <svg class="qr-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </summary>

          <div class="qr-content">
            <p>ສະແກນເພື່ອຕິດຕັ້ງແອັບໃສ່ໜ້າຈໍໂທລະສັບ</p>
            <div class="qr-img-wrapper">
              <img src="https://i.ibb.co/8gPz5vZP/qr-code.png" alt="QR Code">
            </div>
          </div>
        </details>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      © <span id="year"></span> ພັດທະນາໂດຍ: <strong>MR. bounPherng</strong><br>
      <small>ເວັບໄຊທ໌: <a href="https://bounpherng.github.io/IT-BANBAN/" target="_blank">IT-BANBAN</a></small>
    </footer>

  </div>

  <script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        --dur: ${6 + Math.random() * 10}s;
        --delay: ${Math.random() * 8}s;
        width: ${1 + Math.random() * 3}px;
        height: ${1 + Math.random() * 3}px;
        opacity: 0;
      `;
      container.appendChild(p);
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    const APP_URL = 'https://lssomain.laotel.com/Authentication';
    document.getElementById('openApp').addEventListener('click', () => {
      window.open(APP_URL, '_blank');
    });

    let deferredPrompt;
    const installBtn = document.getElementById('installApp');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      installBtn.style.display = 'none';
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User choice: ${outcome}`);
        deferredPrompt = null;
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Checkin/service-worker.js')
          .then(r => console.log('SW registered:', r))
          .catch(e => console.log('SW failed:', e));
      });
    }
  </script>
</body>
</html>
