<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ລະບົບເຊັກອິນ - ຕິດຕັ້ງ</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a6e38">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #0f4d26;
      --green-main:  #1e7d3e;
      --green-mid:   #2e9a57;
      --green-light: #4cc577;
      --white:       #ffffff;
      --text-muted:  rgba(255,255,255,0.65);
    }

    /* ══════════════════════════════════════
       SPLASH SCREEN
    ══════════════════════════════════════ */
    #splash {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #1a7a40 0%, #0f4d26 55%, #071e10 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }

    /* Decorative circles */
    #splash::before, #splash::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      background: var(--white);
    }
    #splash::before {
      width: 500px; height: 500px;
      top: -160px; left: -160px;
    }
    #splash::after {
      width: 340px; height: 340px;
      bottom: -100px; right: -80px;
    }

    /* Ring pulse behind logo */
    .logo-ring {
      position: relative;
      margin-bottom: 32px;
    }
    .logo-ring::before, .logo-ring::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      animation: ring-pulse 2.4s ease-in-out infinite;
    }
    .logo-ring::after {
      inset: -32px;
      border-color: rgba(255,255,255,0.09);
      animation-delay: 0.8s;
    }
    @keyframes ring-pulse {
      0%,100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(1.06); opacity: 0.5; }
    }

    #splashLogo {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      object-fit: cover;
      display: block;
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.15),
        0 20px 60px rgba(0,0,0,0.45);
      animation: logo-in 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes logo-in {
      from { transform: scale(0.55) translateY(30px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    .splash-title {
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      animation: fade-up 0.7s 0.4s both;
    }
    .splash-sub {
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 0.88rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 56px;
      animation: fade-up 0.7s 0.55s both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Progress bar track */
    .progress-wrap {
      width: 220px;
      animation: fade-up 0.7s 0.7s both;
    }
    .progress-label {
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-align: center;
    }
    .progress-track {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--green-light), var(--white));
      box-shadow: 0 0 10px rgba(76,197,119,0.7);
      transition: width 1s linear;
    }

    /* Dot loader */
    .dots {
      display: flex;
      gap: 8px;
      margin-top: 28px;
      animation: fade-up 0.7s 0.85s both;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: dot-blink 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-blink {
      0%,80%,100% { background: rgba(255,255,255,0.25); transform: scale(1); }
      40%         { background: rgba(255,255,255,0.9);  transform: scale(1.3); }
    }

    /* ══════════════════════════════════════
       INSTALL PAGE
    ══════════════════════════════════════ */
    body {
      margin: 0;
      font-family: 'Noto Sans Lao', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      max-width: 90%;
      width: 340px;
    }
    .icon-preview {
      width: 88px; height: 88px;
      border-radius: 18px;
      margin-bottom: 16px;
      object-fit: cover;
      box-shadow: 0 4px 14px rgba(46,154,87,0.3);
    }
    h1 { margin-top: 0; color: #1e7d3e; font-size: 1.4rem; }
    p  { color: #666; margin-bottom: 20px; }

    .btn {
      background: linear-gradient(135deg, #2e9a57, #1e7d3e);
      color: white;
      border: none;
      padding: 13px 24px;
      border-radius: 28px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      display: none;
      box-shadow: 0 4px 14px rgba(30,125,62,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Noto Sans Lao', sans-serif;
    }
    .btn:active { transform: scale(0.96); box-shadow: none; }

    .ios-instruction {
      display: none;
      background: #f4faf6;
      padding: 14px;
      border-radius: 12px;
      margin-top: 14px;
      font-size: 0.9rem;
      border: 1px solid #c8e6d0;
      line-height: 1.6;
      color: #2a6e3f;
    }
  </style>
</head>
<body>

  <!-- ══ SPLASH SCREEN ══ -->
  <div id="splash">
    <div class="logo-ring">
      <img id="splashLogo" src="./icon-192.png" alt="LSSO Logo"
           onerror="this.src=''; this.style.background='#1e7d3e'">
    </div>
    <div class="splash-title">ລະບົບເຊັກອິນ LSSO</div>
    <div class="splash-sub">ປະກັນສັງຄົມ · Check-in System</div>

    <div class="progress-wrap">
      <div class="progress-label" id="countLabel">ກຳລັງໂຫຼດ… 10</div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- ══ INSTALL PAGE ══ -->
  <div class="container" id="mainContent">
    <img src="./icon-192.png" alt="Logo" class="icon-preview"
         onerror="this.src=''; this.style.backgroundColor='#eee'">
    <h1>ລະບົບເຊັກອິນ</h1>
    <p id="statusText">ກະລຸນາຕິດຕັ້ງແອັບເພື່ອເຂົ້າສູ່ລະບົບ</p>

    <button id="installBtn" class="btn">📲 ຕິດຕັ້ງແອັບລົງມືຖື</button>

    <div id="iosPrompt" class="ios-instruction">
      <div>ຕິດຕັ້ງເທິງ iPhone/iPad:</div>
      <div style="margin-top:5px;">1. ກົດປຸ່ມ <strong>Share</strong> <span style="font-size:1.2em">⎋</span> ດ້ານລຸ່ມ</div>
      <div style="margin-top:5px;">2. ເລືອກ <strong>"Add to Home Screen"</strong> ⊞</div>
    </div>

    <p id="redirectMsg" style="display:none; color:#1e7d3e; font-weight:bold; margin-top:12px;">
      ✅ ກຳລັງເຂົ້າສູ່ລະບົບ...
    </p>
  </div>

  <script>
    const REDIRECT_URL  = 'https://lssomain.laotel.com/Authentication';
    const SPLASH_SECS   = 5;

    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches ||
             !!window.navigator.standalone ||
             document.referrer.includes('android-app://');
    }

    /* ── Splash logic ─────────────────────── */
    if (isStandalone()) {
      const splash      = document.getElementById('splash');
      const bar         = document.getElementById('progressBar');
      const countLabel  = document.getElementById('countLabel');
      const main        = document.getElementById('mainContent');

      main.style.display   = 'none';
      splash.style.display = 'flex';

      let elapsed = 0;

      // Start progress bar animation smoothly
      requestAnimationFrame(() => {
        bar.style.width = '100%';
        bar.style.transition = `width ${SPLASH_SECS}s linear`;
      });

      const ticker = setInterval(() => {
        elapsed++;
        const remaining = SPLASH_SECS - elapsed;

        if (remaining > 0) {
          countLabel.textContent = `ກຳລັງໂຫຼດ… ${remaining}`;
        } else {
          countLabel.textContent = 'ກຳລັງເຂົ້າສູ່ລະບົບ…';
          clearInterval(ticker);

          // Fade out splash then redirect
          splash.style.transition = 'opacity 0.5s ease';
          splash.style.opacity    = '0';
          setTimeout(() => { window.location.href = REDIRECT_URL; }, 550);
        }
      }, 1000);
    }

    /* ── Service Worker ───────────────────── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => reg.update())
          .catch(err => console.error('SW Fail', err));
      });
    }

    /* ── Android install prompt ───────────── */
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('User response:', outcome);
      deferredPrompt = null;
    });

    /* ── iOS install hint ─────────────────── */
    const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIos && !isStandalone()) {
      document.getElementById('iosPrompt').style.display = 'block';
    }

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      document.getElementById('statusText').innerText =
        'ຕິດຕັ້ງສຳເລັດ! ກະລຸນາເປີດແອັບຈາກໜ້າຈໍຫຼັກ.';
    });
  </script>
</body>
</html>
